<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café Kids | Nuestras Sucursales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --crema: #FFF9F4; --cafe: #8B5E4E; --terracota: #B78476; --naranja: #D97D0D; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--crema); color: var(--cafe); }
        .nav-glass { background: rgba(255, 249, 254, 0.9); backdrop-filter: blur(10px); }
        .map-frame { width: 100%; height: 200px; border-radius: 25px; border: none; margin-top: 15px; }
        .local-card { transition: 0.5s; background: white; border-radius: 3rem; padding: 2rem; border: 1px solid rgba(0,0,0,0.05); }
        .closest-highlight { ring: 6px solid var(--naranja); transform: scale(1.05); z-index: 10; box-shadow: 0 30px 60px rgba(217, 125, 13, 0.2); }
    </style>
</head>
<body class="pt-24 px-6">
    <nav class="nav-glass fixed top-0 w-full z-[60] px-6 md:px-12 py-3 flex justify-between items-center">
        <a href="index.html"><img src="logo-cafekids.png" alt="Logo" class="h-10 md:h-12"></a>
        <div class="hidden md:flex gap-8 text-[10px] font-bold uppercase tracking-widest">
            <a href="index.html">Nosotros</a>
            <a href="carta.html">Carta 2026</a>
            <a href="locales.html" class="text-[var(--terracota)]">Sucursales</a>
            <a href="club.html">Club Kids</a>
            <a href="seguridad.html">Seguridad</a>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto text-center mb-12">
        <h1 class="text-5xl italic mb-6">Nuestras Sucursales</h1>
        <button onclick="findNearest()" class="bg-[var(--naranja)] text-white px-8 py-3 rounded-full font-bold uppercase text-xs tracking-widest shadow-xl">
            ¡Encontrá el local más cercano a vos!
        </button>
    </div>

    <div class="max-w-7xl mx-auto grid md:grid-cols-3 gap-8 pb-24">
        <!-- Sucursal Batlle -->
        <div id="batlle" class="local-card">
            <h3 class="text-2xl font-bold italic mb-2">Parque Batlle</h3>
            <p class="text-xs opacity-60 mb-4">Palmar 2448 esq. Pedro Campbell</p>
            <p class="text-[10px] font-bold">L a V: 11-21 | S y D: 10-21</p>
            <iframe class="map-frame" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3272.247!2d-56.162391!3d-34.901192!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x959f81076b1f9e2b%3A0xc345371c6d888f4b!2sPalmar%202448!5e0!3m2!1ses!2suy!4v1"></iframe>
        </div>

        <!-- Sucursal Nuevo Centro -->
        <div id="nuevo" class="local-card">
            <h3 class="text-2xl font-bold italic mb-2">Nuevo Centro</h3>
            <p class="text-xs opacity-60 mb-4">Luis A. de Herrera 3444</p>
            <p class="text-[10px] font-bold">L a V: 11-21 | S y D: 10-21</p>
            <iframe class="map-frame" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3273.109!2d-56.173167!3d-34.871183!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x959f806969!2sAv%20Luis%20Alberto%20de%20Herrera%203444!5e0!3m2!1ses!2suy!4v1"></iframe>
        </div>

        <!-- Sucursal Shangrilá -->
        <div id="shangrila" class="local-card">
            <h3 class="text-2xl font-bold italic mb-2">Shangrilá</h3>
            <p class="text-xs opacity-60 mb-4 italic">Venezuela y San Francisco</p>
            <p class="text-[10px] font-bold text-orange-800">Mar a Dom: 15-21 (Lun Cerrado)</p>
            <iframe class="map-frame" src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d3271.8599!2d-56.0028154!3d-34.8538599!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1ses-419!2suy!4v1715654522000!5m2!1ses-419!2suy"></iframe>
        </div>
    </div>

    <script>
        function findNearest() {
            const points = [
                { id: 'batlle', lat: -34.901192, lng: -56.162391 },
                { id: 'nuevo', lat: -34.871183, lng: -56.173167 },
                { id: 'shangrila', lat: -34.8538599, lng: -56.0028154 }
            ];
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const uLat = pos.coords.latitude;
                    const uLng = pos.coords.longitude;
                    let closest = points[0];
                    let minDist = Infinity;
                    points.forEach(p => {
                        const d = Math.sqrt(Math.pow(p.lat-uLat,2)+Math.pow(p.lng-uLng,2));
                        if(d < minDist) { minDist = d; closest = p; }
                    });
                    document.querySelectorAll('.local-card').forEach(c => c.classList.remove('closest-highlight'));
                    const el = document.getElementById(closest.id);
                    el.classList.add('closest-highlight');
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                });
            }
        }
    </script>
</body>
</html>
