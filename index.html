<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café Kids | Carta 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --crema: #FFF9F4; --cafe: #8B5E4E; --terracota: #B78476; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--crema); color: var(--cafe); }
        .tab-btn.active { background: var(--terracota); color: white; }
        .menu-item { border-bottom: 1px solid rgba(139, 94, 78, 0.1); padding: 12px 0; display: flex; justify-content: space-between; font-size: 0.9rem; }
    </style>
</head>
<body class="pt-24 px-6">
    <nav class="fixed top-0 w-full z-[60] bg-white/90 backdrop-blur-md px-12 py-3 flex justify-between items-center border-b">
        <a href="index.html"><img src="logo-cafekids.png" alt="Logo" class="h-10"></a>
        <div class="hidden md:flex gap-8 text-[10px] font-bold uppercase tracking-widest">
            <a href="index.html">Nosotros</a>
            <a href="carta.html" class="text-[var(--terracota)]">Carta 2026</a>
            <a href="locales.html">Sucursales</a>
            <a href="club.html">Club Kids</a>
            <a href="seguridad.html">Seguridad</a>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto py-12">
        <h1 class="text-5xl italic text-center mb-12">Nuestra Carta 2026</h1>
        <!-- Aquí pegas el sistema de Tabs que teníamos antes (Salados, Kids, etc.) -->
        <div class="flex justify-center gap-2 mb-10">
            <button onclick="showTab('sal')" class="tab-btn active px-6 py-2 rounded-full border text-xs font-bold">SALADOS</button>
            <button onclick="showTab('kid')" class="tab-btn px-6 py-2 rounded-full border text-xs font-bold">KIDS</button>
        </div>
        <div id="sal" class="tab-content">
             <div class="menu-item"><span>Sándwich Caliente JyQ</span><span>$360</span></div>
             <div class="menu-item"><span>Tostón Masa Madre</span><span>$310</span></div>
        </div>
        <div id="kid" class="tab-content hidden">
             <div class="menu-item"><span>Mila Fingers + Papas</span><span>$320</span></div>
             <div class="menu-item"><span>Mini Pizzeta Mickey</span><span>$140</span></div>
        </div>
    </div>
    <script>
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.remove('hidden');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
